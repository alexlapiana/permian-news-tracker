services:
  - type: web
    name: permian-news-tracker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: SCRAPE_INTERVAL_HOURS
        value: "12"
      - key: SECRET_KEY
        generateValue: true
